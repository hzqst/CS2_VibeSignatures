    bool (*WarpMouse)(void *, float, float); // rdx

    Mouse = (SDL_Mouse *)SDL_GetMouse();
    if ( (window || (window = Mouse->focus) != nullptr) && (window[72] & 0x40) == 0 )  // 0x88 = SDL_Mouse::focus (structmember, struct=SDL_Mouse, member=focus)
    {
