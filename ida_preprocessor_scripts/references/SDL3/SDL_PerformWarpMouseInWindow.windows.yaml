      Mouse->last_x = X;  // 0xA0 = SDL_Mouse::last_x (structmember, struct=SDL_Mouse, member=last_x)
      Mouse->last_y = y;  // 0xA4 = SDL_Mouse::last_y (structmember, struct=SDL_Mouse, member=last_y)
